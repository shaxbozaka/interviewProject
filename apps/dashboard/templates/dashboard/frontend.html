<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;
  --blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;
  --radius:8px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}

/* Nav */
.nav{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;gap:16px}
.nav-logo{font-size:18px;font-weight:700;white-space:nowrap;cursor:pointer}
.nav-logo span{color:var(--blue)}
.nav-links{display:flex;gap:4px;margin-left:8px}
.nav-links a{padding:6px 12px;border-radius:var(--radius);color:var(--dim);font-size:13px;font-weight:500;transition:background .15s,color .15s;text-decoration:none}
.nav-links a:hover,.nav-links a.active{background:rgba(88,166,255,.1);color:var(--blue)}
.nav-search{flex:1;max-width:400px;position:relative;margin-left:auto}
.nav-search input{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px 7px 32px;font-size:13px;outline:none}
.nav-search input:focus{border-color:var(--blue)}
.nav-search .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px}
.nav-ac{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-top:4px;max-height:240px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.nav-ac .ac-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)}
.nav-ac .ac-item:last-child{border-bottom:none}
.nav-ac .ac-item:hover{background:var(--bg)}
.nav-ac .ac-item .ac-author{color:var(--dim);font-size:12px}
.nav-auth{display:flex;align-items:center;gap:8px;margin-left:8px;white-space:nowrap}
.nav-auth .user-name{color:var(--green);font-weight:500;font-size:13px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:background .15s}
.btn:hover{background:var(--border)}
.btn-primary{background:rgba(88,166,255,.15);border-color:var(--blue);color:var(--blue)}
.btn-primary:hover{background:rgba(88,166,255,.3)}
.btn-green{background:rgba(63,185,80,.15);border-color:var(--green);color:var(--green)}
.btn-green:hover{background:rgba(63,185,80,.3)}
.btn-red{background:rgba(248,81,73,.15);border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(248,81,73,.3)}
.btn-sm{padding:4px 10px;font-size:12px}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
.badge-green{background:rgba(63,185,80,.15);color:var(--green)}
.badge-red{background:rgba(248,81,73,.15);color:var(--red)}
.badge-yellow{background:rgba(210,153,34,.15);color:var(--yellow)}
.badge-blue{background:rgba(88,166,255,.15);color:var(--blue)}
.badge-purple{background:rgba(188,140,255,.15);color:var(--purple)}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:24px}
.page{display:none}.page.active{display:block}

/* Forms */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:var(--dim)}
.form-input{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:14px;outline:none}
.form-input:focus{border-color:var(--blue)}
textarea.form-input{resize:vertical;min-height:80px}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:400px;margin:40px auto}
.form-card h2{font-size:20px;margin-bottom:20px}
.form-msg{padding:8px 12px;border-radius:var(--radius);font-size:13px;margin-bottom:12px}
.form-msg.ok{background:rgba(63,185,80,.1);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.form-msg.err{background:rgba(248,81,73,.1);color:var(--red);border:1px solid rgba(248,81,73,.3)}

/* Hero */
.hero{text-align:center;padding:48px 24px 32px}
.hero h1{font-size:36px;font-weight:700;margin-bottom:8px}
.hero h1 span{color:var(--blue)}
.hero p{color:var(--dim);font-size:16px;margin-bottom:24px}
.hero-search{max-width:500px;margin:0 auto;position:relative}
.hero-search input{width:100%;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px 12px 40px;font-size:16px;outline:none}
.hero-search input:focus{border-color:var(--blue)}
.hero-search .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:16px}
.stats-row{display:flex;justify-content:center;gap:32px;margin-top:32px;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-item .val{font-size:28px;font-weight:700;color:var(--blue)}
.stat-item .lbl{font-size:12px;color:var(--dim);text-transform:uppercase;margin-top:2px}

/* Book Grid */
.section-title{font-size:18px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s}
.book-card:hover{border-color:var(--blue);transform:translateY(-2px)}
.book-card .accent{height:4px}
.book-card .body{padding:14px 16px}
.book-card .title{font-weight:600;font-size:14px;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-card .author{color:var(--dim);font-size:12px;margin-bottom:8px}
.book-card .meta{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.book-card .genre-tag{color:var(--purple);font-size:11px;font-weight:500}
.rating-bar{display:flex;align-items:center;gap:6px}
.rating-bar .bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;min-width:50px}
.rating-bar .bar .fill{height:100%;border-radius:3px;transition:width .3s}
.rating-bar .val{font-size:12px;font-weight:600;min-width:24px}

/* Catalog sidebar */
.catalog-layout{display:grid;grid-template-columns:200px 1fr;gap:24px}
.sidebar{position:sticky;top:80px;align-self:start}
.sidebar h3{font-size:13px;font-weight:600;color:var(--dim);text-transform:uppercase;margin-bottom:8px}
.genre-list{list-style:none}
.genre-list li{margin-bottom:2px}
.genre-list li a{display:block;padding:6px 10px;border-radius:var(--radius);color:var(--text);font-size:13px;transition:background .15s;text-decoration:none}
.genre-list li a:hover,.genre-list li a.active{background:rgba(88,166,255,.1);color:var(--blue)}
.sort-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.sort-bar select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:13px;outline:none}

/* Book Detail */
.detail-header{display:flex;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.detail-cover{width:200px;height:280px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:48px;flex-shrink:0;position:relative;overflow:hidden}
.detail-cover .accent-bar{position:absolute;top:0;left:0;right:0;height:6px}
.detail-info{flex:1;min-width:240px}
.detail-info h1{font-size:24px;margin-bottom:4px}
.detail-info .author{color:var(--dim);font-size:16px;margin-bottom:12px}
.detail-info .meta-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:13px}
.detail-info .meta-row span{color:var(--dim)}
.detail-rating{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.detail-rating .score{font-size:32px;font-weight:700}
.detail-rating .score-label{color:var(--dim);font-size:13px}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
.detail-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.detail-section h3{font-size:15px;font-weight:600;margin-bottom:12px}

/* Rate form */
.rate-form{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.rate-form .slider-group{flex:1;min-width:200px}
.rate-form .slider-group input[type=range]{width:100%;accent-color:var(--blue)}
.rate-form .slider-val{text-align:center;font-size:20px;font-weight:700;color:var(--blue);margin-bottom:4px}
.review-list{margin-top:12px}
.review-item{padding:10px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:none}
.review-item .review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.review-item .review-user{font-weight:500;font-size:13px}
.review-item .review-date{color:var(--dim);font-size:12px}
.review-item .review-text{color:var(--dim);font-size:13px}

/* Search Results */
.search-result{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.search-result:hover{border-color:var(--blue)}
.search-result .sr-title{font-weight:600;margin-bottom:2px}
.search-result .sr-meta{color:var(--dim);font-size:12px}
.source-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
.source-es{background:rgba(210,153,34,.15);color:var(--yellow)}
.source-pg{background:rgba(88,166,255,.15);color:var(--blue)}

/* My Library */
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.profile-avatar{width:64px;height:64px;background:var(--card);border:2px solid var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--blue)}
.profile-info h2{font-size:20px;margin-bottom:2px}
.profile-info p{color:var(--dim);font-size:13px}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.res-card .res-info{flex:1;min-width:200px}
.res-card .res-title{font-weight:600;margin-bottom:2px}
.res-card .res-dates{color:var(--dim);font-size:12px}
.res-card .res-actions{display:flex;gap:6px}
.status-active{color:var(--green)}.status-returned{color:var(--dim)}.status-overdue{color:var(--red)}

/* Pagination */
.pagination{display:flex;justify-content:center;gap:4px;margin-top:24px}
.pagination .pg-btn{padding:6px 12px;border-radius:var(--radius);background:var(--card);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:13px}
.pagination .pg-btn:hover{border-color:var(--blue)}
.pagination .pg-btn.active{background:rgba(88,166,255,.15);border-color:var(--blue);color:var(--blue)}
.pagination .pg-btn:disabled{opacity:.4;cursor:default}

/* Responsive */
@media(max-width:768px){
  .nav{padding:0 12px;gap:8px}
  .nav-links{display:none}
  .nav-search{max-width:none;flex:1}
  .catalog-layout{grid-template-columns:1fr}
  .sidebar{position:static}
  .hero h1{font-size:24px}
  .detail-header{flex-direction:column;align-items:center;text-align:center}
  .container{padding:16px}
}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--dim)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Genre colors */
.genre-fiction{color:#58a6ff}.genre-mystery{color:#bc8cff}.genre-science{color:#3fb950}
.genre-romance{color:#f778ba}.genre-history{color:#d29922}.genre-fantasy{color:#79c0ff}
.genre-thriller{color:#f85149}.genre-biography{color:#ffa657}.genre-horror{color:#f85149}
.genre-default{color:#8b949e}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo" onclick="navigate('/')"><span>Library</span></div>
  <div class="nav-links">
    <a href="#/" data-route="/">Home</a>
    <a href="#/books" data-route="/books">Catalog</a>
  </div>
  <div class="nav-search">
    <span class="icon">&#128269;</span>
    <input type="text" id="nav-search-input" placeholder="Search books...">
    <div class="nav-ac" id="nav-ac"></div>
  </div>
  <div class="nav-auth" id="nav-auth"></div>
</nav>

<!-- Pages -->
<div id="page-home" class="page">
  <div class="hero">
    <h1>Welcome to the <span>Library</span></h1>
    <p>Browse, search, and reserve from our collection</p>
    <div class="hero-search">
      <span class="icon">&#128269;</span>
      <input type="text" id="hero-search-input" placeholder="Search by title, author, or ISBN...">
    </div>
    <div class="stats-row" id="home-stats"></div>
  </div>
  <div class="container">
    <div class="section-title">Top Rated Books</div>
    <div class="book-grid" id="home-top-books"></div>
  </div>
</div>

<div id="page-books" class="page">
  <div class="container">
    <div class="catalog-layout">
      <div class="sidebar">
        <h3>Genres</h3>
        <ul class="genre-list" id="genre-list"></ul>
      </div>
      <div>
        <div class="sort-bar">
          <select id="sort-select" onchange="loadCatalog()">
            <option value="-publication_date">Newest First</option>
            <option value="publication_date">Oldest First</option>
            <option value="title">Title A-Z</option>
            <option value="-title">Title Z-A</option>
            <option value="author">Author A-Z</option>
          </select>
          <span id="book-count" style="color:var(--dim);font-size:13px"></span>
        </div>
        <div class="book-grid" id="catalog-grid"></div>
        <div class="pagination" id="catalog-pagination"></div>
      </div>
    </div>
  </div>
</div>

<div id="page-book-detail" class="page">
  <div class="container" id="book-detail-content"></div>
</div>

<div id="page-search" class="page">
  <div class="container">
    <div class="section-title">
      Search Results for "<span id="search-query-display"></span>"
      <span id="search-source-badge" class="source-badge" style="margin-left:8px"></span>
    </div>
    <div id="search-results-list"></div>
  </div>
</div>

<div id="page-login" class="page">
  <div class="form-card">
    <h2>Sign In</h2>
    <div id="login-msg"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" class="form-input" id="login-username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-input" id="login-password">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign In</button>
    <p style="text-align:center;margin-top:12px;font-size:13px;color:var(--dim)">
      No account? <a href="#/register">Register here</a>
    </p>
  </div>
</div>

<div id="page-register" class="page">
  <div class="form-card">
    <h2>Create Account</h2>
    <div id="register-msg"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" class="form-input" id="reg-username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" class="form-input" id="reg-email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-input" id="reg-password">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doRegister()">Create Account</button>
    <p style="text-align:center;margin-top:12px;font-size:13px;color:var(--dim)">
      Already have an account? <a href="#/login">Sign in</a>
    </p>
  </div>
</div>

<div id="page-my" class="page">
  <div class="container" id="my-library-content">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<script>
const API = '/api/v1';
let token = localStorage.getItem('jwt_token');
let currentUser = null;
let genreCache = [];
let catalogGenre = '';
let catalogNextUrl = null;
let catalogPrevUrl = null;

// Genre color mapping
const GENRE_COLORS = {
  'fiction':'#58a6ff','mystery':'#bc8cff','science':'#3fb950','science fiction':'#3fb950',
  'romance':'#f778ba','history':'#d29922','historical':'#d29922','fantasy':'#79c0ff',
  'thriller':'#f85149','biography':'#ffa657','horror':'#da3633','adventure':'#f0883e',
  'poetry':'#d2a8ff','philosophy':'#8b949e','children':'#56d364','comedy':'#e3b341',
  'drama':'#db61a2','classic':'#8b949e','non-fiction':'#58a6ff','technology':'#3fb950',
};
function genreColor(name) {
  if (!name) return '#8b949e';
  const key = name.toLowerCase();
  return GENRE_COLORS[key] || GENRE_COLORS[Object.keys(GENRE_COLORS).find(k => key.includes(k))] || '#8b949e';
}

// ==================== API CLIENT ====================
function headers(auth = true) {
  const h = {'Content-Type': 'application/json'};
  if (auth && token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

async function api(url, opts = {}) {
  const res = await fetch(url, {headers: headers(opts.auth !== false), ...opts});
  const data = res.headers.get('content-type')?.includes('json') ? await res.json() : null;
  return {status: res.status, data, ok: res.ok};
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ==================== ROUTER ====================
function navigate(path) {
  window.location.hash = path;
}

function getRoute() {
  const hash = window.location.hash.slice(1) || '/';
  return hash;
}

function route() {
  const path = getRoute();
  const pages = document.querySelectorAll('.page');
  pages.forEach(p => p.classList.remove('active'));

  // Update nav active state
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.classList.toggle('active', a.dataset.route === path || (a.dataset.route === '/books' && path.startsWith('/books/')));
  });

  if (path === '/') {
    show('page-home');
    loadHome();
  } else if (path === '/books') {
    show('page-books');
    catalogGenre = '';
    catalogNextUrl = null;
    catalogPrevUrl = null;
    loadCatalog();
    loadGenres();
  } else if (path.match(/^\/books\/(\d+)$/)) {
    const id = path.match(/^\/books\/(\d+)$/)[1];
    show('page-book-detail');
    loadBookDetail(id);
  } else if (path.startsWith('/books?') || path.startsWith('/books&')) {
    show('page-books');
    const params = new URLSearchParams(path.replace('/books?', '').replace('/books&', ''));
    catalogGenre = params.get('genre') || '';
    catalogNextUrl = null;
    catalogPrevUrl = null;
    loadCatalog();
    loadGenres();
  } else if (path.startsWith('/search')) {
    const params = new URLSearchParams(path.split('?')[1] || '');
    const q = params.get('q') || '';
    show('page-search');
    doSearch(q);
  } else if (path === '/login') {
    show('page-login');
  } else if (path === '/register') {
    show('page-register');
  } else if (path === '/my') {
    if (!token) { navigate('/login'); return; }
    show('page-my');
    loadMyLibrary();
  } else {
    show('page-home');
    loadHome();
  }

  updateAuthUI();
}

function show(id) {
  document.getElementById(id).classList.add('active');
}

window.addEventListener('hashchange', route);

// ==================== AUTH ====================
function updateAuthUI() {
  const container = document.getElementById('nav-auth');
  if (token) {
    const name = currentUser?.username || 'User';
    container.innerHTML = `
      <a href="#/my" class="nav-links" style="margin:0"><span class="user-name">${esc(name)}</span></a>
      <button class="btn btn-sm btn-red" onclick="doLogout()">Logout</button>
    `;
  } else {
    container.innerHTML = `
      <a href="#/login" class="btn btn-sm btn-primary">Sign In</a>
      <a href="#/register" class="btn btn-sm" style="text-decoration:none">Register</a>
    `;
  }
}

async function fetchProfile() {
  if (!token) return;
  try {
    const {data, ok} = await api(API + '/users/me/');
    if (ok) currentUser = data;
    else { token = null; localStorage.removeItem('jwt_token'); currentUser = null; }
  } catch { token = null; localStorage.removeItem('jwt_token'); currentUser = null; }
  updateAuthUI();
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const msg = document.getElementById('login-msg');
  if (!username || !password) { msg.innerHTML = '<div class="form-msg err">Please fill in all fields</div>'; return; }
  const {data, ok} = await api(API + '/users/login/', {method: 'POST', body: JSON.stringify({username, password}), auth: false});
  if (ok && data.access) {
    token = data.access;
    localStorage.setItem('jwt_token', token);
    await fetchProfile();
    navigate('/my');
  } else {
    msg.innerHTML = `<div class="form-msg err">${esc(data?.detail || JSON.stringify(data))}</div>`;
  }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const msg = document.getElementById('register-msg');
  if (!username || !password) { msg.innerHTML = '<div class="form-msg err">Username and password required</div>'; return; }
  const body = {username, password};
  if (email) body.email = email;
  const {data, ok} = await api(API + '/users/register/', {method: 'POST', body: JSON.stringify(body), auth: false});
  if (ok) {
    msg.innerHTML = '<div class="form-msg ok">Account created! Signing you in...</div>';
    const login = await api(API + '/users/login/', {method: 'POST', body: JSON.stringify({username, password}), auth: false});
    if (login.ok && login.data.access) {
      token = login.data.access;
      localStorage.setItem('jwt_token', token);
      await fetchProfile();
      navigate('/my');
    } else {
      navigate('/login');
    }
  } else {
    msg.innerHTML = `<div class="form-msg err">${esc(JSON.stringify(data))}</div>`;
  }
}

function doLogout() {
  token = null;
  currentUser = null;
  localStorage.removeItem('jwt_token');
  updateAuthUI();
  navigate('/');
}

// ==================== HOME PAGE ====================
async function loadHome() {
  loadHomeStats();
  loadTopBooks();
}

async function loadHomeStats() {
  try {
    const {data} = await api(API + '/dashboard/stats/', {auth: false});
    const container = document.getElementById('home-stats');
    container.innerHTML = Object.entries(data).map(([k, v]) =>
      `<div class="stat-item"><div class="val">${v.toLocaleString()}</div><div class="lbl">${esc(k)}</div></div>`
    ).join('');
  } catch {}
}

async function loadTopBooks() {
  const container = document.getElementById('home-top-books');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    // Try analytics top books first, fallback to regular books sorted by rating
    let books;
    try {
      const {data, ok} = await api(API + '/analytics/top/', {auth: false});
      if (ok && data?.results?.length) {
        books = data.results.map(a => ({
          id: a.book?.id || a.book_id,
          title: a.book?.title || a.title || 'Unknown',
          author: a.book?.author || a.author || '',
          genre_name: a.book?.genre_name || a.genre_name || '',
          get_rating: a.average_rating || a.book?.get_rating || null,
          available: a.book?.available ?? true,
        }));
      }
    } catch {}
    if (!books || !books.length) {
      const {data} = await api(API + '/books/?ordering=-publication_date&page_size=12', {auth: false});
      books = data?.results || data || [];
    }
    container.innerHTML = books.slice(0, 12).map(b => bookCard(b)).join('');
  } catch {
    container.innerHTML = '<div style="color:var(--dim);text-align:center;padding:20px">Could not load books</div>';
  }
}

// ==================== CATALOG PAGE ====================
async function loadGenres() {
  if (genreCache.length) { renderGenres(); return; }
  try {
    // Fetch all genre pages
    let allGenres = [];
    let url = API + '/genres/?page=1';
    while (url) {
      const {data} = await api(url, {auth: false});
      allGenres = allGenres.concat(data?.results || []);
      url = data?.next || null;
    }
    genreCache = allGenres;
    renderGenres();
  } catch {}
}

function renderGenres() {
  const list = document.getElementById('genre-list');
  list.innerHTML = `<li><a href="#/books" class="${!catalogGenre ? 'active' : ''}" onclick="filterGenre('')">All Genres</a></li>` +
    genreCache.map(g =>
      `<li><a href="#/books?genre=${g.slug}" class="${catalogGenre === g.slug ? 'active' : ''}" onclick="filterGenre('${g.slug}')">${esc(g.name)}</a></li>`
    ).join('');
}

function filterGenre(slug) {
  catalogGenre = slug;
  catalogNextUrl = null;
  catalogPrevUrl = null;
  loadCatalog();
  renderGenres();
}

async function loadCatalog(cursorUrl) {
  const grid = document.getElementById('catalog-grid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const ordering = document.getElementById('sort-select').value;
  let url;
  if (cursorUrl) {
    url = cursorUrl;
  } else {
    url = API + `/books/?ordering=${ordering}`;
    if (catalogGenre) url += `&genre=${catalogGenre}`;
  }
  try {
    const {data} = await api(url, {auth: false});
    const books = data?.results || data || [];
    catalogNextUrl = data?.next || null;
    catalogPrevUrl = data?.previous || null;
    document.getElementById('book-count').textContent = books.length ? `${books.length} books shown` : '';
    grid.innerHTML = books.length
      ? books.map(b => bookCard(b)).join('')
      : '<div style="color:var(--dim);padding:20px">No books found</div>';
    renderPagination();
  } catch {
    grid.innerHTML = '<div style="color:var(--dim);padding:20px">Failed to load books</div>';
  }
}

function renderPagination() {
  const container = document.getElementById('catalog-pagination');
  if (!catalogNextUrl && !catalogPrevUrl) { container.innerHTML = ''; return; }
  container.innerHTML = `
    <button class="pg-btn" ${!catalogPrevUrl ? 'disabled' : ''} onclick="goPage('prev')">&#8592; Previous</button>
    <button class="pg-btn" ${!catalogNextUrl ? 'disabled' : ''} onclick="goPage('next')">Next &#8594;</button>
  `;
}

function goPage(dir) {
  const url = dir === 'next' ? catalogNextUrl : catalogPrevUrl;
  if (!url) return;
  loadCatalog(url);
  window.scrollTo(0, 0);
}

// ==================== BOOK CARD ====================
function bookCard(b) {
  const color = genreColor(b.genre_name);
  const rating = b.get_rating != null ? Math.round(b.get_rating) : null;
  return `<div class="book-card" onclick="navigate('/books/${b.id}')">
    <div class="accent" style="background:${color}"></div>
    <div class="body">
      <div class="title">${esc(b.title)}</div>
      <div class="author">${esc(b.author)}</div>
      <div class="meta">
        <span class="genre-tag" style="color:${color}">${esc(b.genre_name || '')}</span>
        ${rating !== null ? `<div class="rating-bar"><div class="bar"><div class="fill" style="width:${rating}%;background:${ratingColor(rating)}"></div></div><span class="val" style="color:${ratingColor(rating)}">${rating}</span></div>` : '<span style="color:var(--dim);font-size:12px">No ratings</span>'}
      </div>
      <div style="margin-top:6px">
        <span class="badge ${b.available !== false ? 'badge-green' : 'badge-red'}">${b.available !== false ? 'Available' : 'Unavailable'}</span>
      </div>
    </div>
  </div>`;
}

function ratingColor(r) {
  if (r >= 70) return 'var(--green)';
  if (r >= 40) return 'var(--yellow)';
  return 'var(--red)';
}

// ==================== BOOK DETAIL ====================
async function loadBookDetail(id) {
  const container = document.getElementById('book-detail-content');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const {data: book, ok} = await api(API + `/books/${id}/`, {auth: false});
    if (!ok) { container.innerHTML = '<div style="color:var(--red);padding:20px">Book not found</div>'; return; }
    const color = genreColor(book.genre_name);
    const rating = book.get_rating != null ? Math.round(book.get_rating) : null;

    container.innerHTML = `
      <div class="detail-header">
        <div class="detail-cover">
          <div class="accent-bar" style="background:${color}"></div>
          <span style="color:${color}">${esc((book.title || '?')[0].toUpperCase())}</span>
        </div>
        <div class="detail-info">
          <h1>${esc(book.title)}</h1>
          <div class="author">by ${esc(book.author)}</div>
          <div class="meta-row">
            <span style="color:${color}">${esc(book.genre_name || '')}</span>
            ${book.isbn ? `<span>ISBN: ${esc(book.isbn)}</span>` : ''}
            ${book.publication_date ? `<span>Published: ${esc(book.publication_date)}</span>` : ''}
            <span>Copies: ${book.copies_available ?? '?'}/${book.copies_total ?? '?'}</span>
          </div>
          <div class="detail-rating">
            ${rating !== null
              ? `<div class="score" style="color:${ratingColor(rating)}">${rating}</div><div><div style="font-weight:600">/ 100</div><div class="score-label">average rating</div></div>`
              : '<div class="score-label">No ratings yet</div>'}
          </div>
          <div class="detail-actions">
            ${book.read_url ? `<a href="${esc(book.read_url)}" target="_blank" rel="noopener" class="btn btn-primary" style="text-decoration:none">Read This Book</a>` : ''}
            ${book.available !== false
              ? `<button class="btn btn-green" onclick="reserveBook(${book.id})">Reserve This Book</button>`
              : `<span class="badge badge-red" style="font-size:14px;padding:8px 16px">Currently Unavailable</span>`}
            <button class="btn" onclick="navigate('/books')">Back to Catalog</button>
          </div>
        </div>
      </div>

      ${book.description ? `
      <div class="detail-section">
        <h3>About This Book</h3>
        <p style="color:var(--text);line-height:1.7;white-space:pre-line">${esc(book.description)}</p>
      </div>` : ''}

      ${token ? `
      <div class="detail-section">
        <h3>Rate This Book</h3>
        <div id="rate-msg"></div>
        <div class="rate-form">
          <div class="slider-group">
            <div class="slider-val" id="rate-val-display">50</div>
            <input type="range" id="rate-slider" min="1" max="100" value="50" oninput="document.getElementById('rate-val-display').textContent=this.value">
          </div>
          <div style="flex:1;min-width:200px">
            <textarea class="form-input" id="rate-review" placeholder="Write a review (optional)..." rows="2"></textarea>
          </div>
          <button class="btn btn-primary" onclick="rateBook(${book.id})">Submit Rating</button>
        </div>
      </div>` : `<div class="detail-section"><h3>Rate This Book</h3><p style="color:var(--dim)"><a href="#/login">Sign in</a> to rate this book</p></div>`}

      <div class="detail-section">
        <h3>Reviews</h3>
        <div id="book-reviews"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    `;

    loadBookReviews(id);
  } catch {
    container.innerHTML = '<div style="color:var(--red);padding:20px">Failed to load book details</div>';
  }
}

async function loadBookReviews(bookId) {
  const container = document.getElementById('book-reviews');
  try {
    // Ratings are part of the book, but we can get them via the list or separate endpoint
    // For now, show a placeholder since reviews come embedded in ratings
    const {data} = await api(API + `/books/${bookId}/`, {auth: false});
    // The API doesn't return reviews in detail, but we try
    container.innerHTML = '<div style="color:var(--dim);font-size:13px">Rate this book above to add the first review.</div>';
  } catch {
    container.innerHTML = '<div style="color:var(--dim)">Could not load reviews</div>';
  }
}

async function rateBook(bookId) {
  if (!token) { navigate('/login'); return; }
  const rate = parseInt(document.getElementById('rate-slider').value);
  const review = document.getElementById('rate-review').value.trim();
  const msg = document.getElementById('rate-msg');
  const body = {rate};
  if (review) body.review = review;
  const {data, ok} = await api(API + `/books/${bookId}/rate/`, {method: 'POST', body: JSON.stringify(body)});
  if (ok) {
    msg.innerHTML = '<div class="form-msg ok">Rating submitted!</div>';
    setTimeout(() => loadBookDetail(bookId), 500);
  } else {
    msg.innerHTML = `<div class="form-msg err">${esc(data?.detail || JSON.stringify(data))}</div>`;
  }
}

async function reserveBook(bookId) {
  if (!token) { navigate('/login'); return; }
  const {data, ok} = await api(API + '/reservations/', {method: 'POST', body: JSON.stringify({book: bookId})});
  if (ok) {
    alert('Book reserved successfully! Check My Library for details.');
    loadBookDetail(bookId);
  } else {
    alert('Could not reserve: ' + (data?.detail || JSON.stringify(data)));
  }
}

// ==================== SEARCH ====================
async function doSearch(query) {
  const q = query || '';
  document.getElementById('search-query-display').textContent = q;
  const list = document.getElementById('search-results-list');
  const sourceBadge = document.getElementById('search-source-badge');
  if (!q) { list.innerHTML = '<div style="color:var(--dim);padding:20px">Enter a search term</div>'; return; }
  list.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const {data} = await api(API + '/search/?q=' + encodeURIComponent(q), {auth: false});
    const results = data?.results || data || [];
    const source = data?.source || 'elasticsearch';
    sourceBadge.textContent = source;
    sourceBadge.className = 'source-badge ' + (source.toLowerCase().includes('elastic') ? 'source-es' : 'source-pg');
    list.innerHTML = results.length
      ? results.map(r => `<div class="search-result" onclick="navigate('/books/${r.id}')">
          <div class="sr-title">${esc(r.title)}</div>
          <div class="sr-meta">${esc(r.author || '')} ${r.isbn ? ' &middot; ' + esc(r.isbn) : ''}</div>
        </div>`).join('')
      : '<div style="color:var(--dim);padding:20px">No results found</div>';
  } catch {
    list.innerHTML = '<div style="color:var(--red);padding:20px">Search failed</div>';
  }
}

// ==================== MY LIBRARY ====================
async function loadMyLibrary() {
  const container = document.getElementById('my-library-content');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  if (!token) { navigate('/login'); return; }

  try {
    const [{data: profile}, {data: resData}] = await Promise.all([
      api(API + '/users/me/'),
      api(API + '/reservations/'),
    ]);

    const reservations = resData?.results || resData || [];
    const active = reservations.filter(r => r.status === 'active' || r.status === 'pending');
    const returned = reservations.filter(r => r.status === 'returned');

    const initial = (profile?.username || '?')[0].toUpperCase();

    container.innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">${esc(initial)}</div>
        <div class="profile-info">
          <h2>${esc(profile?.username || 'User')}</h2>
          <p>${esc(profile?.email || '')}</p>
        </div>
      </div>

      <div class="section-title">Active Reservations <span class="badge badge-blue">${active.length}</span></div>
      <div id="active-reservations">
        ${active.length ? active.map(r => reservationCard(r, true)).join('') : '<div style="color:var(--dim);padding:16px">No active reservations. <a href="#/books">Browse the catalog</a> to reserve a book.</div>'}
      </div>

      <div style="margin-top:24px">
        <div class="section-title">History <span class="badge badge-green">${returned.length}</span></div>
        ${returned.length ? returned.map(r => reservationCard(r, false)).join('') : '<div style="color:var(--dim);padding:16px">No history yet</div>'}
      </div>
    `;
  } catch {
    container.innerHTML = '<div style="color:var(--red);padding:20px">Failed to load your library. Please try again.</div>';
  }
}

function reservationCard(r, isActive) {
  const statusClass = r.status === 'active' ? 'status-active' : r.status === 'overdue' ? 'status-overdue' : 'status-returned';
  return `<div class="res-card">
    <div class="res-info">
      <div class="res-title">${esc(r.book_title || 'Book #' + r.book)}</div>
      <div class="res-dates">
        Reserved: ${formatDate(r.reserved_at)} &middot; Due: ${formatDate(r.due_date)}
        ${r.returned_at ? ' &middot; Returned: ' + formatDate(r.returned_at) : ''}
      </div>
    </div>
    <span class="badge ${r.status === 'active' ? 'badge-green' : r.status === 'overdue' ? 'badge-red' : 'badge-blue'} ${statusClass}">${esc(r.status)}</span>
    ${isActive ? `<div class="res-actions">
      <button class="btn btn-sm btn-green" onclick="extendReservation(${r.id})">Extend 7d</button>
      <button class="btn btn-sm btn-red" onclick="returnReservation(${r.id})">Return</button>
    </div>` : ''}
  </div>`;
}

async function returnReservation(id) {
  if (!token) return;
  const {data, ok} = await api(API + `/reservations/${id}/return_book/`, {method: 'POST', body: '{}'});
  if (ok) {
    loadMyLibrary();
  } else {
    alert('Return failed: ' + (data?.detail || JSON.stringify(data)));
  }
}

async function extendReservation(id) {
  if (!token) return;
  const {data, ok} = await api(API + `/reservations/${id}/extend/`, {method: 'POST', body: JSON.stringify({days: 7})});
  if (ok) {
    loadMyLibrary();
  } else {
    alert('Extend failed: ' + (data?.detail || JSON.stringify(data)));
  }
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString();
}

// ==================== NAV SEARCH + AUTOCOMPLETE ====================
let acTimer;
const navInput = document.getElementById('nav-search-input');
const navAc = document.getElementById('nav-ac');

navInput.addEventListener('input', function() {
  clearTimeout(acTimer);
  const q = this.value.trim();
  if (q.length < 2) { navAc.style.display = 'none'; return; }
  acTimer = setTimeout(async () => {
    try {
      const {data} = await api(API + '/search/autocomplete/?q=' + encodeURIComponent(q), {auth: false});
      const results = data?.suggestions || data?.results || [];
      if (results.length) {
        navAc.innerHTML = results.map(r => {
          const title = r.title || r;
          return `<div class="ac-item" onclick="navAcSelect('${esc(String(title).replace(/'/g, "\\'"))}')"><div>${esc(title)}</div></div>`;
        }).join('');
        navAc.style.display = 'block';
      } else {
        navAc.style.display = 'none';
      }
    } catch { navAc.style.display = 'none'; }
  }, 200);
});

navInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const q = this.value.trim();
    if (q) { navAc.style.display = 'none'; navigate('/search?q=' + encodeURIComponent(q)); }
  }
});

function navAcSelect(title) {
  navInput.value = title;
  navAc.style.display = 'none';
  navigate('/search?q=' + encodeURIComponent(title));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.nav-search')) navAc.style.display = 'none';
});

// Hero search
document.getElementById('hero-search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const q = this.value.trim();
    if (q) navigate('/search?q=' + encodeURIComponent(q));
  }
});

// Login form enter key
document.getElementById('login-password')?.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('reg-password')?.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

// ==================== INIT ====================
(async function init() {
  if (token) await fetchProfile();
  updateAuthUI();
  route();
})();
</script>
