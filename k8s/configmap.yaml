apiVersion: v1
kind: ConfigMap
metadata:
  name: library-config
  namespace: library
data:
  DJANGO_SETTINGS_MODULE: "config.settings.production"
  DB_NAME: "library_db"
  DB_USER: "library_user"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "amqp://library_user:library_pass@rabbitmq:5672//"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  ALLOWED_HOSTS: "*"
  CORS_ALLOWED_ORIGINS: ""
