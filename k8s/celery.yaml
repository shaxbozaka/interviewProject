apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: library
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery
          image: library-web:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "config", "worker",
                    "-l", "info",
                    "--concurrency", "4",
                    "-Q", "default,notifications,analytics"]
          envFrom:
            - configMapRef:
                name: library-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: library-secrets
                  key: SECRET_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: library-secrets
                  key: DB_PASSWORD
          livenessProbe:
            exec:
              command: ["celery", "-A", "config", "inspect", "ping", "--timeout", "5"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: library
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: library-web:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "config", "beat",
                    "-l", "info",
                    "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
          envFrom:
            - configMapRef:
                name: library-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: library-secrets
                  key: SECRET_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: library-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
